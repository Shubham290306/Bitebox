<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .clsbox{
            display: flex;
            margin: 200px auto;
            background-color: #F1E7BA;
            padding: 30px;
            width: 200px;
            align-items: center;
            justify-content: center;
            border-radius: 10px;

        }
        button{
            display: block;
            background-color: #E84420;
            margin: 25px auto;
            padding: 10px;
            width: 95%;
             border-radius: 20px;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        input{
            border-radius: 10px;
            background-color: white;
            padding: 10px;
            margin: 2px;

            
        }
        input::placeholder{
            color: grey;
        }
        label{
           color: white;
            
        }
      </style>
</head>
<body>
    <section class="authentication">
        <div class="clsbox">
            
            <form action="" > 
                <label for="" color="white">Enter Username</label><br>
                <input type="email" placeholder="Enter email ID"><br><br>
                <label for="" color="white">Enter Password</label><br>
                <input type="password" placeholder="Password here" ><br><br>
                <button type="submit">Login</button>
            </form>
           
        </div>




    </section>
</body>
</html>
